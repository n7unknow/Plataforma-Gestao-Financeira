<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Configurações</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    </head>
    <body>
        <div class="layout">
            <aside class="sidebar">
                <header class="topo">
                    <div>
                        <h2 class="app_tittle"><strong>FinControl</strong></h2>
                        <img src="img/usuario_banco.png" alt="Logo" class="img_usuario">
                        <h2 id="name_user">Olá, "Usuário"👋</h2> <br>
                    </div>
                </header>
                <nav>
                    <a href="Home.html">🏠 Home</a>
                        <a href="Carteira.html">💳 Carteira</a>
                        <a href="Transações.html">💸 Transações</a>
                        <a href="Relatórios.html">📈 Relatórios</a>
                        <a href="Configurações.html" class="active_page">⚙ Configurações</a>
                </nav>
            </aside>

            <aside class="configuracoes">
                <h1>Configurações</h1>

                <form id="formConfig" class="config-card">
                    <label>Nome usuário</label>
                    <input id="inputUsuario" type="text" placeholder="Digite o nome" required>

                    <label>Saldo carteira digital</label>
                    <input id="inputCarteiraDigital" type="number" placeholder="Digite o saldo digital" required>

                    <label>Saldo carteira física</label>
                    <input id="inputCarteiraFisica" type="number" required placeholder="Digite o saldo físico" required>

                    <label>Mês de referência</label>
                    <select id="selectMesRef">
                        <option value="" disabled selected>Selecione o mês</option>
                        <option>Janeiro</option>
                        <option>Fevereiro</option>
                        <option>Março</option>
                        <option>Abril</option>
                        <option>Maio</option>
                        <option>Junho</option>
                        <option>Julho</option>
                        <option>Agosto</option>
                        <option>Setembro</option>
                        <option>Outubro</option>
                        <option>Novembro</option>
                        <option>Dezembro</option>
                    </select>

                    <label>Meta de Economia</label>
                    <input id="inputMeta" type="number" placeholder="Digite o valor da meta">

                    <button id="btnSalvar" type="submit">Salvar Dados</button>
                </form>
                <h2 id="how_use"><strong>Como usar?</strong></h2>
                <video controls autoplay loop poster="">
                    <source src="videos/how_to_use.mp4" type="video/mp4">
                </video>
            </aside> <br>
        </div>
        <script src="script.js"></script>
    </body>
</html>
