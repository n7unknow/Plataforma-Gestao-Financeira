<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Novo Cartão</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
    <body>
        <div class="configuracoes">
            <button title="Voltar" onclick="window.location.href='Carteira.html'" id="btnVoltar">
                <i class="bi bi-arrow-left"></i>
            </button>

            <h1>Novo Cartão</h1><br>

            <form id="formCartao" class="config-card">
                <label>Apelido do cartão</label>
                <input id="inputApelido" type="text" placeholder="Ex: Cartão Principal" required> <br>

                <label>Nome do cartão</label>
                <input id="inputNomeCartao" type="text" placeholder="Ex: Cartão Principal" minlength="5" maxlength="30" required> <br>

                <label>Número do cartão</label>
                <input id="inputNumero" type="tel" placeholder="Ex: 9999 9999 9999 9999" minlength="19" maxlength="19" required> <br>

                <label>CVV do cartão</label>
                <input id="inputCVV" type="tel" placeholder="Ex: 999" minlength="3" maxlength="3" required> <br>

                <label>Data de vencimento do cartão</label>
                <input id="inputVencimento" type="tel" placeholder="Ex: 12/32" maxlength="5" required> <br>

                <label>Limite do cartão</label>
                <input id="inputLimite" type="number" placeholder="Ex: 5000" required> <br>

                <button type="submit">Adicionar Cartão</button>
            </form>
        </div>
        <script src="script.js"></script>
    </body>
</html>
