<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transações Financeiras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
             <header class="topo">
                <div>
                    <h2 class="app_tittle"><strong>FinControl</strong></h2>
                    <img src="img/usuario_banco.png" alt="Logo" class="img_usuario">
                    <h2 id="name_user">Olá, "Usuário"👋</h2> <br>
                </div>
            </header>
            <nav>
                <a href="Home.html">🏠 Home</a>
                <a href="Carteira.html">💳 Carteira</a>
                <a href="Transações.html" class="active_page">💸 Transações</a>
                <a href="Relatórios.html">📈 Relatórios</a>
                <a href="Configurações.html">⚙ Configurações</a>
            </nav>
        </aside>

        <aside class="transacoes2">
            <h1>Transações</h1>

            <form class="form-transacao">
                <input id="inputDescricao" type="text" placeholder="Descrição da transação" required>
                <input id="inputValor" type="number" placeholder="Valor da transação" required>
                <select id="selectTipo" required>
                    <option value="" disabled selected>Selecione o tipo da transação</option>
                    <option>Receita</option>
                    <option>Despesa</option>
                </select>
                <select id="selectCategoria" required>
                    <option value="" disabled selected>Selecione a categoria</option>
                    <option>Alimentação</option>
                    <option>Transporte</option>
                    <option>Lazer</option>
                    <option>FreeLance/Crédito</option>
                    <option>Saúde</option>
                    <option>Educação</option>
                    <option>Moradia</option>
                    <option>Outros</option>
                </select>
                <select id="selectMes" required>
                    <option value="" disabled selected>Mês da transação</option>
                    <option>Janeiro</option>
                    <option>Fevereiro</option>
                    <option>Março</option>
                    <option>Abril</option>
                    <option>Maio</option>
                    <option>Junho</option>
                    <option>Julho</option>
                    <option>Agosto</option>
                    <option>Setembro</option>
                    <option>Outubro</option>
                    <option>Novembro</option>
                    <option>Dezembro</option>
                </select>

                <button id="btnAdicionar" type="button">Adicionar</button>
            </form>

            <section class="lista-transacoes">
                <h2>Histórico</h2>
                <div id="listaTransacoes"></div>
            </section>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
