<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transações Financeiras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="transacoes">
        <h1>Transações</h1>

    <section class="form-transacao">
        <input type="text" placeholder="Descrição">
        <input type="number" placeholder="Valor">

        <select>
            <option>Receita</option>
            <option>Despesa</option>
        </select>

        <select>
            <option>Alimentação</option>
            <option>Transporte</option>
            <option>Lazer</option>
            <option>Salário</option>
        </select>
    
        <button>
            Adicionar
        </button>

    </section>

    <section class="lista-transacoes">
            <h2>Histórico</h2>

        <div class="transacao-item receita-item">

        <div>
            <h3>Salário</h3>
            <p>Receita</p>
        </div>

        <span>+R$4500</span>
        </div>

        <div class="transacao-item despesa-item">
        <div>
            <h3>Mercado</h3>
            <p>Alimentação</p>
        </div>
        <span>-R$350</span>
        </div>

    </section>
    </main>

</body>
</html>
