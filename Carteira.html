<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Carteira Financeira</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
    <body>
        <div class="layout">
            <aside class="sidebar">
                <header class="topo">
                    <div>
                        <h2 class="app_tittle"><strong>FinControl</strong></h2>
                        <img src="img/usuario_banco.png" alt="Logo" class="img_usuario">
                        <h2 id="name_user">Olá, "Usuário"👋</h2> <br>
                    </div>
                </header>
                <nav>
                    <a href="Home.html">🏠 Home</a>
                    <a href="Carteira.html" class="active_page">💳 Carteira</a>
                    <a href="Transações.html">💸 Transações</a>
                    <a href="Relatórios.html">📈 Relatórios</a>
                    <a href="Configurações.html">⚙ Configurações</a>
                </nav>
            </aside>

            <aside class="carteira2">
                <h1>Minha Carteira</h1> <br> <br>

                <select id="select_mes_carteira">
                    <option value="">Selecione o mês</option>
                    <option>Janeiro</option>
                    <option>Fevereiro</option>
                    <option>Março</option>
                    <option>Abril</option>
                    <option>Maio</option>
                    <option>Junho</option>
                    <option>Julho</option>
                    <option>Agosto</option>
                    <option>Setembro</option>
                    <option>Outubro</option>
                    <option>Novembro</option>
                    <option>Dezembro</option>
                </select>
                <section class="contas">
                    <div class="conta-card nubank">
                        <h2>Carteira Digital</h2>
                        <p>Saldo disponível</p>
                        <h1 id="saldoDigital">R$ 0,00</h1>
                    </div>
                    <div class="conta-card Nubank">
                        <h2>Conta Fisica</h2>
                        <p>Saldo disponível</p>
                        <h1 id="saldoFisico">R$ 0,00</h1>
                    </div>
                </section>

                <br><br>
                <h2>Cartões</h2><br><br>

                <section class="cartoes" id="listaCartoes"></section> <br>
                <div style="display:flex; justify-content:center;">
                    <button id="btnNovoCartao" onclick="window.location.href='NovoCartao.html'">+</button>
                </div>
                </section>
            </aside>
        </div>
        <script src="script.js"></script>
    </body>
</html>
