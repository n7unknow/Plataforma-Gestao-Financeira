<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Financeira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="carteira">

    <h1>Minha Carteira</h1>

    <section class="contas">

        <div class="conta-card nubank">

            <h2>Conta Digital</h2>

            <p>Saldo disponível</p>

            <h1>R$ 5.480,00</h1>

        </div>


        <div class="conta-card Nubank">

            <h2>Conta Corrente</h2>

            <p>Saldo disponível</p>

            <h1>R$ 2.100,00</h1>

        </div>

    </section>


    <h2>Cartões</h2>

    <section class="cartoes">

        <div class="cartao roxo">

            <span>Cartão Principal</span>

            <h2>•••• 4589</h2>

            <p>Limite: R$ 4.000</p>

        </div>


        <div class="cartao preto">

            <span>Premium</span>

            <h2>•••• 7852</h2>

            <p>Limite: R$ 7.000</p>

        </div>

    </section>

</main>

</body>
</html>
