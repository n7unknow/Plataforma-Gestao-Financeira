<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Relatórios Financeiros</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    </head>
    <body>
        <div class="layout">
            <aside class="sidebar">
                <header class="topo">
                    <div>
                        <h2 class="app_tittle"><strong>FinControl</strong></h2>
                        <img src="img/usuario_banco.png" alt="Logo" class="img_usuario">
                        <h2 id="name_user">Olá, "Usuário"👋</h2> <br>
                    </div>
                </header>
                <nav>
                    <a href="Home.html">🏠 Home</a>
                    <a href="Carteira.html">💳 Carteira</a>
                    <a href="Transações.html">💸 Transações</a>
                    <a href="Relatórios.html" class="active_page">📈 Relatórios</a>
                    <a href="Configurações.html">⚙ Configurações</a>
                </nav>
            </aside>

            <aside class="relatorios2">
                <h1>Relatórios Financeiros</h1> 
                <p>Relatório de desempenho financeiro por mês</p><br> <br>

                <select id="select_mes_relatorio">
                    <option value="">Todos os meses</option>
                    <option>Janeiro</option>
                    <option>Fevereiro</option>
                    <option>Março</option>
                    <option>Abril</option>
                    <option>Maio</option>
                    <option>Junho</option>
                    <option>Julho</option>
                    <option>Agosto</option>
                    <option>Setembro</option>
                    <option>Outubro</option>
                    <option>Novembro</option>
                    <option>Dezembro</option>
                </select>
                <section class="cards-relatorio">
                    <div class="relatorio-card">
                        <h3>Receitas Totais</h3>
                        <h2 id="totalReceitas">R$ 0,00</h2>
                    </div>
                    <div class="relatorio-card">
                        <h3>Despesas Totais</h3>
                        <h2 id="totalDespesas">R$ 0,00</h2>
                    </div>
                    <div class="relatorio-card">
                        <h3>Saldo Final</h3>
                        <h2 id="saldoFinal">R$ 0,00</h2>
                    </div>
                </section>

                <section class="historico-relatorio">
                    <h2>Resumo Mensal</h2>
                    <table>
                        <tr>
                            <th>Mês</th>
                            <th>Receitas</th>
                            <th>Despesas</th>
                            <th>Saldo</th>
                            <th>Meta</th>
                        </tr>
                        <tbody id="tabelaRelatorio"></tbody>
                    </table>
                </section>
            </aside>
        </div>
        <script src="script.js"></script>
    </body>
</html>
